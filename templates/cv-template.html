<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 11px;
    line-height: 1.5;
    color: #000;
    background: #fff;
    padding: 0.5in;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 0;
    font-family: "Georgia", "Times New Roman", serif;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    margin-bottom: 10px;
    border-bottom: none;
  }

  .header h1 {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 24px;
    font-weight: 700;
    color: #000;
    margin-bottom: 4px;
    line-height: 1.1;
    letter-spacing: 1px;
  }

  .header-gradient {
    display: none;
  }

  .contact-row {
    font-size: 10px;
    line-height: 1.5;
    color: #000;
    font-family: "Georgia", "Times New Roman", serif;
  }

  .contact-row a {
    color: #000;
    text-decoration: none;
  }

  .contact-row .separator {
    color: #000;
    margin: 0 4px;
  }

  /* === SECTIONS === */
  .section {
    margin-bottom: 8px;
  }

  .section-title {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: #000;
    border-bottom: 2px solid #000;
    padding-bottom: 3px;
    margin-bottom: 6px;
    line-height: 1.2;
    letter-spacing: 0.5px;
  }

  /* === PROFESSIONAL SUMMARY === */
  .summary-text {
    font-size: 11px;
    line-height: 1.5;
    color: #000;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* === CORE COMPETENCIES === */
  .competencies-grid {
    display: inline;
    font-size: 11px;
    line-height: 1.5;
  }

  .competency-tag {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 11px;
    font-weight: 400;
    color: #000;
    background: none;
    padding: 0;
    border: none;
    border-radius: 0;
    display: inline;
  }

  /* === WORK EXPERIENCE === */
  .job {
    margin-bottom: 8px;
  }

  .job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 1px;
  }

  .job-company {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 11px;
    font-weight: 700;
    color: #000;
  }

  .job-period {
    font-size: 11px;
    color: #000;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .job-role {
    font-size: 11px;
    font-style: normal;
    font-weight: 400;
    color: #000;
    margin-bottom: 2px;
  }

  .job-location {
    font-size: 11px;
    color: #000;
    margin-bottom: 2px;
  }

  .job ul {
    padding-left: 20px;
    margin-top: 2px;
    margin-bottom: 0;
  }

  .job li {
    font-size: 11px;
    line-height: 1.45;
    color: #000;
    margin-bottom: 2px;
  }

  .job li strong {
    font-weight: 700;
  }

  /* === PROJECTS === */
  .project {
    margin-bottom: 6px;
  }

  .project-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .project-title {
    font-family: "Georgia", "Times New Roman", serif;
    font-size: 11px;
    font-weight: 700;
    color: #000;
  }

  .project-date {
    font-size: 11px;
    color: #000;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .project-desc {
    font-size: 11px;
    color: #000;
    margin-top: 1px;
    line-height: 1.45;
  }

  .project-tech {
    font-size: 10px;
    font-style: normal;
    color: #000;
    margin-top: 1px;
  }

  /* === EDUCATION === */
  .edu-item {
    margin-bottom: 6px;
  }

  .edu-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .edu-title {
    font-weight: 700;
    font-size: 11px;
    color: #000;
  }

  .edu-org {
    color: #000;
    font-style: normal;
    font-weight: 700;
    font-size: 11px;
  }

  .edu-year {
    font-size: 11px;
    color: #000;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .edu-desc {
    font-size: 10px;
    color: #000;
    margin-top: 1px;
    line-height: 1.4;
  }

  /* === CERTIFICATIONS === */
  .cert-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 4px;
  }

  .cert-title {
    font-size: 11px;
    font-weight: 400;
    color: #000;
  }

  .cert-org {
    color: #000;
    font-weight: 700;
    font-size: 11px;
  }

  .cert-year {
    font-size: 11px;
    color: #000;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* === SKILLS === */
  .skills-grid {
    display: block;
  }

  .skill-item {
    font-size: 11px;
    color: #000;
    display: block;
    margin-bottom: 2px;
    line-height: 1.5;
  }

  .skill-category {
    font-weight: 700;
    color: #000;
    font-size: 11px;
    display: inline;
  }

  /* === ACTIVITIES === */
  .activity {
    margin-bottom: 6px;
  }

  .activity-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .activity-title {
    font-weight: 700;
    font-size: 11px;
    color: #000;
  }

  .activity-location {
    font-size: 11px;
    color: #000;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .activity-role {
    font-size: 11px;
    font-weight: 400;
    color: #000;
    margin-bottom: 1px;
  }

  .activity-period {
    font-size: 11px;
    color: #000;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .activity ul {
    padding-left: 20px;
    margin-top: 1px;
    margin-bottom: 0;
  }

  .activity li {
    font-size: 11px;
    line-height: 1.45;
    color: #000;
    margin-bottom: 1px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      padding: 0.5in;
    }

    .page {
      padding: 0;
    }
  }

  /* === PAGE BREAK CONTROL === */
  .avoid-break,
  .job,
  .project,
  .edu-item,
  .cert-item,
  .activity {
    break-inside: avoid;
    page-break-inside: avoid;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="contact-row">{{CONTACT_INFO}}</div>
  </div>

  <!-- EDUCATION -->
  <div class="section">
    <div class="section-title">{{SECTION_EDUCATION}}</div>
    {{EDUCATION}}
  </div>

  <!-- WORK EXPERIENCE -->
  <div class="section">
    <div class="section-title">{{SECTION_EXPERIENCE}}</div>
    {{EXPERIENCE}}
  </div>

  <!-- PROJECTS (OPTIONAL) -->
  {{#IF_PROJECTS}}
  <div class="section">
    <div class="section-title">{{SECTION_PROJECTS}}</div>
    {{PROJECTS}}
  </div>
  {{/IF_PROJECTS}}

  <!-- ACTIVITIES (OPTIONAL) -->
  {{#IF_ACTIVITIES}}
  <div class="section">
    <div class="section-title">{{SECTION_ACTIVITIES}}</div>
    {{ACTIVITIES}}
  </div>
  {{/IF_ACTIVITIES}}

  <!-- ADDITIONAL (SKILLS, LANGUAGES, CERTS, AWARDS) -->
  <div class="section">
    <div class="section-title">{{SECTION_ADDITIONAL}}</div>
    {{ADDITIONAL}}
  </div>

</div>
</body>
</html>
